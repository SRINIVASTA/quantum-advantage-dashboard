name: Streamlit App Pytest Suite Validation

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code structure
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest -r requirements.txt

    # GATING PROTECTION: If pytest catches flatlines or structural breaks,
    # it returns code 1, immediately breaking the pipeline and blocking deployment.
    - name: Run verification test routines
      run: |
        pytest -v -p no:cacheprovider test_app.py
